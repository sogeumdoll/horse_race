<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>경마형 제비뽑기 — Derby Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bowlby+One&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #0b1414;
    --bg-2: #102020;
    --dirt-1: #8b4513;
    --dirt-2: #a0522d;
    --dirt-3: #6b3410;
    --dirt-light: #c4732b;
    --grass-edge: #2a6a3e;
    --accent: #ffd23f;
    --accent-2: #ff5e3a;
    --accent-3: #3aa9ff;
    --ink: #f5efe0;
    --ink-dim: #b8b09a;
    --panel: #161f1f;
    --panel-2: #1f2a2a;
    --border: #2e3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-1);
    color: var(--ink);
    font-family: "Noto Sans KR", system-ui, sans-serif;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at top, #1a2a2a 0%, var(--bg-1) 60%) no-repeat,
      var(--bg-1);
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    padding: 10px;
  }

  /* ============ HEADER ============ */
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    background: linear-gradient(180deg, #1a2424, #0f1818);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 0 0 1px #000 inset, 0 4px 12px rgba(0,0,0,0.4);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-logo {
    width: 32px; height: 32px;
    background: var(--accent);
    color: #0b1414;
    display: grid;
    place-items: center;
    font-family: "Bowlby One", sans-serif;
    font-size: 18px;
    transform: skewX(-10deg);
  }
  .brand-logo span { transform: skewX(10deg); }
  .brand-title {
    font-family: "Bebas Neue", sans-serif;
    font-size: 24px;
    letter-spacing: 2.5px;
  }
  .brand-sub {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--ink-dim);
    margin-top: -3px;
  }
  .marquee {
    font-family: "Bebas Neue", sans-serif;
    letter-spacing: 3px;
    font-size: 22px;
    text-align: center;
    color: var(--accent);
    text-shadow: 2px 2px 0 #000;
  }
  .marquee em { color: var(--ink); font-style: normal; }
  .clock-wrap { display: flex; justify-content: flex-end; align-items: center; gap: 8px; }
  .status-pill {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: #0b1414;
    letter-spacing: 1px;
  }
  .status-pill.live { color: #ff5e3a; }
  .status-pill.idle { color: var(--ink-dim); }
  .status-pill.done { color: var(--accent); }
  .clock {
    font-family: "JetBrains Mono", monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    background: #000;
    padding: 3px 10px;
    border: 1px solid var(--border);
    min-width: 95px;
    text-align: center;
    letter-spacing: 2px;
  }

  /* ============ MAIN ============ */
  .stage {
    display: grid;
    grid-template-columns: 240px 1fr 240px;
    gap: 8px;
    min-height: 0;
  }

  /* 트랙 */
  .track-wrap {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 0 1px #000 inset;
    display: flex;
    flex-direction: column;
  }
  .track-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 12px;
    background: #0b1414;
    border-bottom: 1px solid var(--border);
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 1px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .track-header .race-no { color: var(--accent); font-weight: 700; }
  .track-header .distance-info { color: var(--ink-dim); }
  .track-header .phase { color: var(--accent-2); font-weight: 700; }

  .track {
    flex: 1;
    position: relative;
    background:
      /* 잔디 가장자리 */
      linear-gradient(180deg,
        var(--grass-edge) 0%, var(--grass-edge) 4%,
        var(--dirt-3) 4%, var(--dirt-2) 8%,
        var(--dirt-1) 50%,
        var(--dirt-2) 92%, var(--dirt-3) 96%,
        var(--grass-edge) 96%, var(--grass-edge) 100%);
    overflow: hidden;
  }
  /* 흙 텍스처 (점, 자갈) */
  .track::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 30%, rgba(0,0,0,0.15) 1px, transparent 2px),
      radial-gradient(circle at 25% 65%, rgba(255,255,255,0.05) 1px, transparent 2px),
      radial-gradient(circle at 40% 20%, rgba(0,0,0,0.1) 1px, transparent 2px),
      radial-gradient(circle at 55% 80%, rgba(0,0,0,0.12) 1px, transparent 2px),
      radial-gradient(circle at 70% 40%, rgba(255,255,255,0.04) 1px, transparent 2px),
      radial-gradient(circle at 85% 70%, rgba(0,0,0,0.1) 1px, transparent 2px),
      radial-gradient(circle at 95% 25%, rgba(0,0,0,0.08) 1px, transparent 2px);
    background-size: 30px 30px, 40px 40px, 25px 25px, 35px 35px, 28px 28px, 42px 42px, 33px 33px;
    pointer-events: none;
  }

  .lanes {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 0;
  }
  .lane {
    flex: 1;
    position: relative;
    border-bottom: 1px dashed rgba(255,255,255,0.15);
  }
  .lane:nth-child(even) {
    background: linear-gradient(90deg,
      rgba(0,0,0,0.05) 0%,
      rgba(0,0,0,0.08) 50%,
      rgba(0,0,0,0.05) 100%);
  }
  .lane:last-child { border-bottom: none; }
  .lane-label {
    position: absolute;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-family: "Bowlby One", sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    width: 18px;
    text-align: center;
    z-index: 1;
  }

  /* 출발선 */
  .start-line {
    position: absolute;
    left: 35px;
    top: 0; bottom: 0;
    width: 5px;
    background: repeating-linear-gradient(0deg, #fff 0 8px, #000 8px 16px);
    z-index: 2;
    opacity: 0.9;
  }
  .finish-line {
    position: absolute;
    right: 35px;
    top: 0; bottom: 0;
    width: 8px;
    background: repeating-conic-gradient(#fff 0 25%, #000 0 50%);
    background-size: 8px 8px;
    z-index: 2;
    box-shadow: 0 0 12px rgba(255, 210, 63, 0.5);
  }
  .finish-flag {
    position: absolute;
    right: 25px;
    top: -2px;
    font-family: "Bebas Neue", sans-serif;
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 2px;
    background: #000;
    padding: 2px 6px;
    z-index: 3;
    border: 1px solid var(--accent);
  }
  /* 거리 표시 */
  .distance-marks {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .distance-marks span {
    position: absolute;
    top: 2px;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    transform: translateX(-50%);
    background: rgba(0,0,0,0.3);
    padding: 1px 4px;
    border-radius: 2px;
  }

  /* ============ 동물 캐릭터 ============ */
  .racer {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    will-change: left;
    transition: left 0.1s linear;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .racer-name {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 1px 4px;
    border-radius: 2px;
    white-space: nowrap;
    line-height: 1.2;
    margin-bottom: 1px;
  }
  .racer-svg {
    width: 42px;
    height: 32px;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5));
    overflow: visible;
  }
  .racer.running .racer-svg {
    animation: body-bob 0.22s ease-in-out infinite;
  }
  @keyframes body-bob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-3px) rotate(1deg); }
  }

  /* 다리/발 갤럽 */
  .leg { transform-origin: top center; }
  .racer.running .leg-1 { animation: gallop1 0.22s linear infinite; }
  .racer.running .leg-2 { animation: gallop2 0.22s linear infinite; }
  .racer.running .leg-3 { animation: gallop3 0.22s linear infinite; }
  .racer.running .leg-4 { animation: gallop4 0.22s linear infinite; }
  @keyframes gallop1 {
    0%   { transform: rotate(-35deg); }
    50%  { transform: rotate(30deg); }
    100% { transform: rotate(-35deg); }
  }
  @keyframes gallop2 {
    0%   { transform: rotate(25deg); }
    50%  { transform: rotate(-25deg); }
    100% { transform: rotate(25deg); }
  }
  @keyframes gallop3 {
    0%   { transform: rotate(30deg); }
    50%  { transform: rotate(-30deg); }
    100% { transform: rotate(30deg); }
  }
  @keyframes gallop4 {
    0%   { transform: rotate(-30deg); }
    50*  { transform: rotate(35deg); }
    100% { transform: rotate(-30deg); }
  }

  /* 상태 효과 */
  .racer.boost .racer-svg {
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5)) drop-shadow(0 0 8px var(--accent-2));
  }
  .racer.shielded .racer-svg {
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5)) drop-shadow(0 0 8px var(--accent-3));
  }
  .racer.slowed .racer-svg {
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5)) grayscale(0.5);
  }
  .racer.hit .racer-svg {
    animation: hit-shake 0.4s ease-out;
  }
  @keyframes hit-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px) rotate(-8deg); }
    40% { transform: translateX(4px) rotate(8deg); }
    60% { transform: translateX(-3px) rotate(-5deg); }
    80% { transform: translateX(3px) rotate(5deg); }
  }

  /* 스피드 라인 */
  .speed-lines {
    position: absolute;
    right: 100%;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 24px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .racer.boost .speed-lines { opacity: 1; }
  .speed-lines::before, .speed-lines::after {
    content: "";
    position: absolute;
    background: rgba(255,255,255,0.85);
    height: 2px;
    border-radius: 2px;
    animation: speed-line 0.3s linear infinite;
  }
  .speed-lines::before { width: 14px; top: 6px;  right: 0; }
  .speed-lines::after  { width: 20px; top: 14px; right: 0; animation-delay: 0.15s; }
  @keyframes speed-line {
    0%   { transform: translateX(0); opacity: 0.85; }
    100% { transform: translateX(-28px); opacity: 0; }
  }

  /* 방패 효과 */
  .shield-bubble {
    position: absolute;
    inset: -6px;
    border: 2px solid var(--accent-3);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(58,169,255,0.15), transparent);
    box-shadow: 0 0 12px var(--accent-3), inset 0 0 8px var(--accent-3);
    pointer-events: none;
    animation: shield-pulse 0.8s ease-in-out infinite;
  }
  @keyframes shield-pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.08); }
  }

  /* 아이템 사용 말풍선 */
  .item-popup {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #000;
    font-family: "Bowlby One", sans-serif;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    box-shadow: 2px 2px 0 #000;
    animation: item-pop 1.2s ease-out forwards;
    pointer-events: none;
    z-index: 10;
  }
  .item-popup::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--accent);
  }
  .item-popup.attack { background: var(--accent-2); color: #fff; }
  .item-popup.attack::after { border-top-color: var(--accent-2); }
  .item-popup.shield { background: var(--accent-3); color: #fff; }
  .item-popup.shield::after { border-top-color: var(--accent-3); }
  .item-popup.slow { background: #a78bfa; color: #fff; }
  .item-popup.slow::after { border-top-color: #a78bfa; }
  @keyframes item-pop {
    0%   { transform: translateX(-50%) translateY(8px) scale(0.5); opacity: 0; }
    15%  { transform: translateX(-50%) translateY(-4px) scale(1.15); opacity: 1; }
    25%  { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
    80%  { transform: translateX(-50%) translateY(-2px) scale(1); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-10px) scale(0.9); opacity: 0; }
  }

  /* 공격 이펙트 (번개) */
  .attack-fx {
    position: absolute;
    pointer-events: none;
    z-index: 20;
    font-size: 32px;
    transform: translate(-50%, -50%);
    animation: attack-fx 0.6s ease-out forwards;
    filter: drop-shadow(0 0 6px var(--accent));
  }
  @keyframes attack-fx {
    0%   { transform: translate(-50%, -50%) scale(0.3) rotate(-15deg); opacity: 0; }
    30%  { transform: translate(-50%, -50%) scale(1.4) rotate(0deg); opacity: 1; }
    60%  { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.8) rotate(-5deg); opacity: 0; }
  }

  /* 먼지 */
  .dust {
    position: absolute;
    width: 6px; height: 6px;
    background: rgba(180, 130, 80, 0.7);
    border-radius: 50%;
    pointer-events: none;
    animation: dust-fade 0.7s ease-out forwards;
  }
  @keyframes dust-fade {
    from { transform: scale(1); opacity: 0.7; }
    to   { transform: scale(3) translateX(-30px) translateY(-2px); opacity: 0; }
  }

  /* ============ 사이드 패널 ============ */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-head {
    background: #0b1414;
    padding: 6px 10px;
    font-family: "Bebas Neue", sans-serif;
    font-size: 13px;
    letter-spacing: 2.5px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body {
    padding: 8px;
    overflow-y: auto;
    flex: 1;
  }

  /* 왼쪽: 실시간 순위 */
  .left-col, .right-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }

  .rank-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .rank-item {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    align-items: center;
    padding: 5px 7px;
    gap: 6px;
    background: var(--panel-2);
    border-left: 3px solid var(--border);
    border-radius: 2px;
    transition: all 0.3s ease;
    font-size: 12px;
  }
  .rank-item.rank-1 { border-left-color: var(--accent); background: linear-gradient(90deg, rgba(255,210,63,0.18), var(--panel-2)); }
  .rank-item.rank-2 { border-left-color: #c0c0c0; }
  .rank-item.rank-3 { border-left-color: #cd7f32; }
  .rank-item.finished { opacity: 0.85; }
  .rank-num {
    font-family: "Bowlby One", sans-serif;
    font-size: 14px;
    color: var(--accent);
  }
  .rank-item.rank-2 .rank-num { color: #d0d0d0; }
  .rank-item.rank-3 .rank-num { color: #e89b50; }
  .rank-item:not(.rank-1):not(.rank-2):not(.rank-3) .rank-num { color: var(--ink-dim); font-size: 12px; }
  .rank-name {
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
  }
  .rank-name .animal-tag {
    color: var(--ink-dim);
    font-size: 9px;
    margin-right: 3px;
  }
  .rank-progress {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    color: var(--ink-dim);
    text-align: right;
    line-height: 1.2;
  }
  .rank-progress .speed { color: var(--accent-2); font-weight: 700; }
  .rank-item.finished .rank-progress { color: var(--accent); font-weight: 700; }

  /* 컨트롤 패널 (오른쪽 하단) */
  .control-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 8px;
  }
  .control-row label {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    color: var(--ink-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .num-input {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .num-input button {
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--border);
    width: 28px; height: 28px;
    font-family: "Bowlby One", sans-serif;
    font-size: 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.1s;
  }
  .num-input button:hover { background: var(--accent); color: #000; }
  .num-input button:disabled { opacity: 0.3; cursor: not-allowed; }
  .num-input input {
    flex: 1;
    background: #000;
    color: var(--accent);
    border: 1px solid var(--border);
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 15px;
    font-weight: 700;
    padding: 4px;
    border-radius: 2px;
  }
  .name-list {
    background: #000;
    border: 1px solid var(--border);
    width: 100%;
    color: var(--ink);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    padding: 6px;
    resize: none;
    border-radius: 2px;
    height: 80px;
  }
  .name-list:focus { outline: 1px solid var(--accent); }

  .btn-start {
    background: var(--accent-2);
    color: #fff;
    border: none;
    padding: 12px;
    font-family: "Bowlby One", sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    width: 100%;
    box-shadow: 0 4px 0 #a83b1f, 0 0 0 1px #000;
    transition: all 0.08s;
  }
  .btn-start:hover { transform: translateY(-1px); box-shadow: 0 5px 0 #a83b1f, 0 0 0 1px #000; }
  .btn-start:active { transform: translateY(3px); box-shadow: 0 1px 0 #a83b1f, 0 0 0 1px #000; }
  .btn-start:disabled {
    background: #555;
    box-shadow: 0 4px 0 #333, 0 0 0 1px #000;
    cursor: not-allowed;
  }
  .btn-reset {
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--border);
    padding: 6px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    width: 100%;
    margin-top: 6px;
    transition: all 0.1s;
  }
  .btn-reset:hover { color: var(--ink); border-color: var(--ink); }

  /* 이벤트 로그 */
  .event-log {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .event-item {
    font-size: 11px;
    padding: 4px 7px;
    background: rgba(255,255,255,0.04);
    border-left: 2px solid var(--border);
    border-radius: 2px;
    animation: event-slide 0.3s ease-out;
    line-height: 1.3;
  }
  .event-item.boost { border-left-color: var(--accent-2); }
  .event-item.attack { border-left-color: var(--accent-2); background: rgba(255,94,58,0.1); }
  .event-item.shield { border-left-color: var(--accent-3); background: rgba(58,169,255,0.08); }
  .event-item.slow { border-left-color: #a78bfa; }
  .event-item.finish { border-left-color: var(--accent); background: rgba(255,210,63,0.12); font-weight: 700; }
  .event-item.start { border-left-color: var(--accent); }
  .event-item .ev-time {

<script>
/* =============================================================

   ============================================================= */

const STATE = {

// ============ 동물 종류 (이름 + SVG 빌더) ============
// 각 동물은 자기만의 시각적 특성을 가짐
const ANIMALS = [
  { name: '말',    emoji: '🐎', body: '#3a2418', mane: '#1a0e08', accent: '#5a3828', type: 'horse' },
  { name: '낙타',  emoji: '🐪', body: '#c4915a', mane: '#8b5a3c', accent: '#d4a070', type: 'camel' },
  { name: '양',    emoji: '🐑', body: '#f0f0e8', mane: '#3a3028', accent: '#d8d4c8', type: 'sheep' },
  { name: '표범',  emoji: '🐆', body: '#d4a04c', mane: '#1a1208', accent: '#8b6028', type: 'leopard' },
  { name: '늑대',  emoji: '🐺', body: '#6a6058', mane: '#3a3028', accent: '#8b8278', type: 'wolf' },
  { name: '돼지',  emoji: '🐖', body: '#f4a8a0', mane: '#d88880', accent: '#fac0b8', type: 'pig' },
  { name: '호랑이',emoji: '🐅', body: '#f0883a', mane: '#1a0a04', accent: '#fab068', type: 'tiger' },
  { name: '사슴',  emoji: '🦌', body: '#9a6840', mane: '#5a3018', accent: '#b08858', type: 'deer' },
  { name: '소',    emoji: '🐄', body: '#e8e0d0', mane: '#3a2818', accent: '#a8201a', type: 'cow' },
  { name: '여우',  emoji: '🦊', body: '#e8722c', mane: '#f0f0e8', accent: '#a04018', type: 'fox' },
  { name: '얼룩말',emoji: '🦓', body: '#f0e8d8', mane: '#1a1208', accent: '#3a3028', type: 'zebra' },
  { name: '코뿔소',emoji: '🦏', body: '#888078', mane: '#5a5048', accent: '#a89880', type: 'rhino' },
];

/**
 * SVG 동물 생성 - 동물 타입에 따라 약간씩 다른 외형
 * 모든 동물은 4족보행으로 같은 구조 사용하되, 색상/특징적 요소만 다름
 */
function createRacerSVG(animal, jockeyColor) {
  const { body, mane, accent, type, name } = animal;

  // 동물별 특징 (귀, 꼬리, 무늬 등)
  let ears = '';
  let tail = '';
  let pattern = '';
  let nose = `<ellipse cx="38" cy="11" rx="2" ry="1.3" fill="${accent}"/><circle cx="39" cy="11" r="0.4" fill="#000"/>`;

  // 귀
  if (type === 'horse' || type === 'zebra' || type === 'camel') {
    ears = `<path d="M 33 5 L 34 2 L 35.5 5 Z" fill="${body}"/>`;
  } else if (type === 'wolf' || type === 'fox') {
    ears = `<path d="M 32 5 L 33 1 L 35 4 Z" fill="${body}"/><path d="M 33 4 L 33.5 2 L 34.5 3.5 Z" fill="${mane}"/>`;
  } else if (type === 'leopard' || type === 'tiger') {
    ears = `<circle cx="33" cy="4" r="2" fill="${body}"/><circle cx="33" cy="4" r="1" fill="${mane}"/>`;
  } else if (type === 'cow' || type === 'rhino') {
    ears = `<ellipse cx="32" cy="5" rx="2.5" ry="1.5" fill="${body}" transform="rotate(-20 32 5)"/>`;
  } else if (type === 'pig') {
    ears = `<path d="M 32 5 L 33 2 L 35 5 L 34 6 Z" fill="${accent}"/>`;
  } else if (type === 'sheep') {
    ears = `<ellipse cx="32" cy="6" rx="1.8" ry="1" fill="${mane}" transform="rotate(-30 32 6)"/>`;
  } else if (type === 'deer') {
    // 뿔
    ears = `<path d="M 33 5 L 32 1 M 33 5 L 34 1 M 32 2 L 31 1 M 34 2 L 35 1" stroke="${mane}" stroke-width="0.6" fill="none"/><path d="M 35 5 L 35.5 3 L 36.5 5 Z" fill="${body}"/>`;
  }

  // 꼬리
  if (type === 'horse' || type === 'zebra') {
    tail = `<path d="M 6 14 Q 1 12 0 17 Q -1 22 3 23 Q 5 18 7 18 Z" fill="${mane}"/>`;
  } else if (type === 'wolf' || type === 'fox') {
    tail = `<path d="M 6 14 Q 1 11 -2 16 Q -1 20 3 21 Z" fill="${body}"/><path d="M 0 18 Q -2 19 -1 21 Q 1 20 2 18 Z" fill="${type === 'fox' ? '#fff' : mane}"/>`;
  } else if (type === 'pig') {
    tail = `<path d="M 7 14 Q 4 13 3 11 Q 5 10 6 12" stroke="${accent}" stroke-width="1.2" fill="none" stroke-linecap="round"/>`;
  } else if (type === 'sheep' || type === 'deer') {
    tail = `<ellipse cx="5" cy="15" rx="2" ry="1.5" fill="${type === 'sheep' ? body : '#fff'}"/>`;
  } else if (type === 'cow') {
    tail = `<path d="M 6 14 Q 2 14 1 18 Q 3 20 4 20 Q 3 16 6 16 Z" fill="${mane}"/><circle cx="1" cy="19" r="1" fill="${mane}"/>`;
  } else {
    tail = `<path d="M 6 14 Q 2 13 1 17 Q 3 19 7 17 Z" fill="${body}"/>`;
  }

  // 무늬 (얼룩말, 호랑이, 표범, 소)
  if (type === 'zebra') {
    pattern = `
      <rect x="14" y="11" width="1.2" height="5" fill="#1a1208"/>
      <rect x="18" y="10" width="1.2" height="6" fill="#1a1208"/>
      <rect x="22" y="11" width="1.2" height="5" fill="#1a1208"/>
      <rect x="26" y="10" width="1.2" height="6" fill="#1a1208"/>`;
  } else if (type === 'tiger') {
    pattern = `
      <path d="M 14 11 Q 15 10 14 14" stroke="#1a0a04" stroke-width="0.8" fill="none"/>
      <path d="M 18 10 Q 19 11 18 15" stroke="#1a0a04" stroke-width="0.8" fill="none"/>
      <path d="M 22 11 Q 23 10 22 14" stroke="#1a0a04" stroke-width="0.8" fill="none"/>
      <path d="M 26 10 Q 27 11 26 15" stroke="#1a0a04" stroke-width="0.8" fill="none"/>`;
  } else if (type === 'leopard') {
    pattern = `
      <circle cx="14" cy="13" r="1" fill="#1a1208"/>
      <circle cx="18" cy="11" r="1.2" fill="#1a1208"/>
      <circle cx="22" cy="13" r="1" fill="#1a1208"/>
      <circle cx="26" cy="12" r="1.2" fill="#1a1208"/>
      <circle cx="20" cy="15" r="0.8" fill="#1a1208"/>`;
  } else if (type === 'cow') {
    pattern = `
      <ellipse cx="15" cy="13" rx="2.5" ry="1.8" fill="${accent}"/>
      <ellipse cx="24" cy="14" rx="3" ry="2" fill="${accent}"/>
      <ellipse cx="20" cy="11" rx="1.5" ry="1" fill="${accent}"/>`;
  } else if (type === 'sheep') {
    // 양털 (구름 모양)
    pattern = `
      <circle cx="14" cy="11" r="2" fill="${body}"/>
      <circle cx="17" cy="10" r="2" fill="${body}"/>
      <circle cx="21" cy="10" r="2" fill="${body}"/>
      <circle cx="25" cy="11" r="2" fill="${body}"/>
      <circle cx="16" cy="14" r="2" fill="${body}"/>
      <circle cx="22" cy="14" r="2" fill="${body}"/>`;
  }

  // 코뿔소: 뿔 추가
  let extra = '';
  if (type === 'rhino') {
    extra = `<path d="M 38 9 L 39 5 L 40.5 9 Z" fill="${accent}"/>`;
  }

  // 사람 (사슴) 갈기
  let maneShape = '';
  if (type === 'horse' || type === 'zebra') {
    maneShape = `
      <path d="M 28 6 Q 29 4 31 5 L 30 8 Z" fill="${mane}"/>
      <path d="M 30 5 Q 32 3 33 4 L 32 7 Z" fill="${mane}"/>`;
  } else if (type === 'wolf' || type === 'tiger') {
    maneShape = `<path d="M 28 6 Q 30 4 33 6 L 32 8 L 28 8 Z" fill="${mane}"/>`;
  }

  return `
<svg class="racer-svg" viewBox="-3 0 45 32" xmlns="http://www.w3.org/2000/svg">
  ${tail}

  <!-- 뒷다리 -->
  <g class="leg leg-3" style="transform-origin: 12px 16px;">
    <rect x="10.5" y="16" width="2.5" height="11" fill="${body}" rx="0.8"/>
    <rect x="10" y="25" width="3.5" height="2.5" fill="#1a0a04" rx="0.5"/>

  <g class="leg leg-4" style="transform-origin: 16px 16px;">

  <!-- 몸통 -->
  <ellipse cx="18" cy="15" rx="12" ry="5.5" fill="${body}"/>
  <ellipse cx="18" cy="17" rx="11" ry="3" fill="${accent}" opacity="0.4"/>

  ${pattern}

  <!-- 가슴 -->
  <ellipse cx="27" cy="16" rx="4.5" ry="5" fill="${body}"/>

  <!-- 안장 + 기수 -->
  <ellipse cx="18" cy="9" rx="5.5" ry="2" fill="#2a1810"/>
  <path d="M 14 9 Q 15 4 18 3 Q 21 4 22 9 Z" fill="${jockeyColor}"/>
  <circle cx="18" cy="3" r="2.2" fill="${jockeyColor}"/>
  <circle cx="18" cy="3" r="2.2" fill="none" stroke="#000" stroke-width="0.3"/>
  <!-- 기수 팔 -->
  <path d="M 21 7 Q 26 7 28 9" stroke="${jockeyColor}" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- 앞다리 -->
  <g class="leg leg-1" style="transform-origin: 25px 17px;">
    <rect x="23.5" y="17" width="2.5" height="10" fill="${body}" rx="0.8"/>
    <rect x="23" y="25" width="3.5" height="2.5" fill="#1a0a04" rx="0.5"/>
  </g>
  <g class="leg leg-2" style="transform-origin: 29px 17px;">
    <rect x="27.5" y="17" width="2.5" height="10" fill="${accent}" rx="0.8"/>
    <rect x="27" y="25" width="3.5" height="2.5" fill="#1a0a04" rx="0.5"/>
  </g>

  <!-- 목 -->
  <path d="M 28 13 Q 33 9 37 7 Q 39 9 37 12 Q 33 15 30 16 Z" fill="${body}"/>
  ${maneShape}

  <!-- 머리 -->
  <path d="M 35 7 Q 41 5 43 8 Q 44 11 42 13 Q 40 14 37 12 Q 35 10 35 7 Z" fill="${body}"/>
  ${extra}
  ${nose}
  <!-- 눈 -->
  <circle cx="39" cy="8" r="0.6" fill="#000"/>
  <circle cx="39.2" cy="7.8" r="0.2" fill="#fff"/>
  ${ears}
</svg>`;
}

// 기수 색상
const JOCKEY_COLORS = [

const clockEl = $('clock');
const statusPill = $('statusPill');
const phaseInfo = $('phaseInfo');
const finishedCount = $('finishedCount');
const footerHint = $('footerHint');
const startBtn = $('startBtn');
const resetBtn = $('resetBtn');
const countInput = $('count');
const namesInput = $('names');
const incBtn = $('inc');
const decBtn = $('dec');
const countdownEl = $('countdown');
const resultModal = $('resultModal');
const podiumEl = $('podium');
const fullResultsEl = $('fullResults');
const closeModalBtn = $('closeModal');
const rerunBtn = $('rerunBtn');
const raceNoEl = $('raceNo');

/* ============ 초기화 ============ */
function init() {
  drawDistanceMarks();
  setupRacers();
  bindEvents();
  updateTrackWidth();
  window.addEventListener('resize', () => {
    updateTrackWidth();
    if (!STATE.isRunning) setupRacers();
  });
}

function drawDistanceMarks() {
  distMarks.innerHTML = '';
  const positions = [0, 25, 50, 75, 100];
  positions.forEach(p => {
    const span = document.createElement('span');
    span.textContent = p === 0 ? 'START' : p === 100 ? 'GOAL' : (p * 10) + 'm';
    span.style.left = `calc(${STATE.trackLeftPad}px + (100% - ${STATE.trackLeftPad + STATE.trackRightPad}px) * ${p/100})`;
    distMarks.appendChild(span);
  });
}

function updateTrackWidth() {
  STATE.trackWidthPx = trackEl.clientWidth - STATE.trackLeftPad - STATE.trackRightPad;
}

/* ============ 참가자 생성 ============ */
function getNames() {
  const raw = namesInput.value.trim();
  const lines = raw ? raw.split('\n').map(s => s.trim()).filter(Boolean) : [];
  const result = [];
  for (let i = 0; i < STATE.numHorses; i++) {
    result.push(lines[i] || `참가자 ${i+1}`);
  }
  return result;
}

function setupRacers() {
  STATE.numHorses = Math.max(2, Math.min(12, parseInt(countInput.value) || 6));
  countInput.value = STATE.numHorses;
  STATE.names = getNames();
  STATE.finishOrder = 0;

  // 동물 셔플
  const animalPool = [...ANIMALS].sort(() => Math.random() - 0.5);

  lanesEl.innerHTML = '';
  STATE.horses = [];

  for (let i = 0; i < STATE.numHorses; i++) {
    const lane = document.createElement('div');
    lane.className = 'lane';
    const label = document.createElement('div');
    label.className = 'lane-label';
    label.textContent = i + 1;
    lane.appendChild(label);

    const animal = animalPool[i % animalPool.length];
    const jockey = JOCKEY_COLORS[i % JOCKEY_COLORS.length];

    const racer = document.createElement('div');
    racer.className = 'racer';
    racer.dataset.id = i;
    racer.innerHTML = `
      <div class="speed-lines"></div>
      <div class="racer-name">${STATE.names[i]}</div>
      ${createRacerSVG(animal, jockey)}
    `;
    lane.appendChild(racer);
    lanesEl.appendChild(lane);

    STATE.horses.push({
      id: i,
      name: STATE.names[i],
      animal: animal,
      el: racer,
      distance: 0,
      finished: false,
      finishTime: 0,
      finishOrder: 0,
      profile: buildPaceProfile(),
      currentSpeed: 0,
      activeEffects: [],   // { type, until, power }
      nextItemTime: 1500 + Math.random() * 3000, // 첫 아이템 사용 시점
      itemsUsed: 0,
    });
  }

  updateTrackWidth();
  renderRank(true);
  positionAllRacersAtStart();
  $('trackDistInfo').textContent = STATE.raceDistance + 'm';
  $('durationInfo').textContent = '~' + Math.round(STATE.raceDuration / 1000) + 's';
}

/* ============ 페이스 프로파일 ============ */
function buildPaceProfile() {
  const base = 1.0 + (Math.random() - 0.5) * 0.06;
  // 더 강한 사인파 → 더 다이나믹한 변동
  const wave1 = {
    amp: 0.35 + Math.random() * 0.25,
    freq: 0.8 + Math.random() * 1.8,
    phase: Math.random() * Math.PI * 2,
  };
  const wave2 = {
    amp: 0.20 + Math.random() * 0.20,
    freq: 2.5 + Math.random() * 3.5,
    phase: Math.random() * Math.PI * 2,
  };
  const wave3 = { // 추가 변동
    amp: 0.12 + Math.random() * 0.12,
    freq: 5 + Math.random() * 4,
    phase: Math.random() * Math.PI * 2,
  };
  return { base, wave1, wave2, wave3 };
}

function paceAt(profile, t) {
  let v = profile.base;
  v += profile.wave1.amp * Math.sin(profile.wave1.freq * Math.PI * 2 * t + profile.wave1.phase);
  v += profile.wave2.amp * Math.sin(profile.wave2.freq * Math.PI * 2 * t + profile.wave2.phase);
  v += profile.wave3.amp * Math.sin(profile.wave3.freq * Math.PI * 2 * t + profile.wave3.phase);
  if (v < 0.2) v = 0.2;
  return v;
}

function positionAllRacersAtStart() {
  STATE.horses.forEach(h => {
    h.el.style.left = STATE.trackLeftPad + 'px';
  });
}

/* ============ 이벤트 ============ */
function bindEvents() {
  incBtn.addEventListener('click', () => {
    if (STATE.isRunning) return;
    const v = parseInt(countInput.value) || 6;
    countInput.value = Math.min(12, v + 1);
    setupRacers();
  });
  decBtn.addEventListener('click', () => {
    if (STATE.isRunning) return;
    const v = parseInt(countInput.value) || 6;
    countInput.value = Math.max(2, v - 1);
    setupRacers();
  });
  countInput.addEventListener('change', () => {
    if (STATE.isRunning) return;
    let v = parseInt(countInput.value) || 6;
    v = Math.max(2, Math.min(12, v));
    countInput.value = v;
    setupRacers();
  });
  namesInput.addEventListener('input', () => {
    if (STATE.isRunning) return;
    STATE.names = getNames();
    STATE.horses.forEach((h, i) => {
      h.name = STATE.names[i];
      const nameEl = h.el.querySelector('.racer-name');
      if (nameEl) nameEl.textContent = h.name;
    });
    renderRank(true);
  });
  startBtn.addEventListener('click', startRace);
  resetBtn.addEventListener('click', resetRace);
  closeModalBtn.addEventListener('click', () => resultModal.classList.remove('show'));
  rerunBtn.addEventListener('click', () => {
    resultModal.classList.remove('show');
    resetRace();
    setTimeout(startRace, 250);
  });
}

/* ============ 레이스 시작 ============ */
async function startRace() {
  if (STATE.isRunning) return;
  STATE.horses.forEach(h => {
    h.distance = 0;
    h.finished = false;
    h.finishTime = 0;
    h.finishOrder = 0;
    h.profile = buildPaceProfile();
    h.currentSpeed = 0;
    h.activeEffects = [];
    h.nextItemTime = 1500 + Math.random() * 3000;
    h.itemsUsed = 0;
    h.el.classList.remove('boost', 'shielded', 'slowed', 'hit');
    // 방패 효과 제거
    const oldShield = h.el.querySelector('.shield-bubble');
    if (oldShield) oldShield.remove();
  });
  STATE.finishOrder = 0;
  STATE.events = [];
  eventLogEl.innerHTML = '';
  positionAllRacersAtStart();
  renderRank(true);

  startBtn.disabled = true;
  resetBtn.disabled = true;
  incBtn.disabled = true;
  decBtn.disabled = true;
  countInput.disabled = true;
  namesInput.disabled = true;
  statusPill.className = 'status-pill live';
  statusPill.textContent = '● COUNTDOWN';
  footerHint.textContent = '곧 출발합니다...';

  await countdown();

  STATE.isRunning = true;
  STATE.startTime = performance.now();
  statusPill.textContent = '● LIVE';
  phaseInfo.textContent = 'RUNNING';
  footerHint.textContent = '🏇 레이스 진행 중!';
  addEvent('start', 0, '레이스 시작!', '');

  STATE.horses.forEach(h => h.el.classList.add('running'));
  STATE.animFrame = requestAnimationFrame(tick);
}

function countdown() {
  return new Promise(resolve => {
    const seq = ['3', '2', '1', 'GO!'];
    let i = 0;
    countdownEl.classList.add('show');
    countdownEl.querySelector('.text').textContent = seq[i];
    const interval = setInterval(() => {
      i++;
      if (i >= seq.length) {
        clearInterval(interval);
        countdownEl.classList.remove('show');
        resolve();
        return;
      }
      const txt = countdownEl.querySelector('.text');
      txt.style.animation = 'none';
      txt.offsetHeight;
      txt.style.animation = '';
      txt.textContent = seq[i];
    }, 700);
  });
}

/* ============ 메인 루프 ============ */
function tick(now) {
  if (!STATE.isRunning) return;
  const elapsed = now - STATE.startTime;
  const t = Math.min(elapsed / STATE.raceDuration, 1);
  const dtSec = STATE.animFrameLast ? Math.min((now - STATE.animFrameLast) / 1000, 0.1) : 0.016;
  STATE.animFrameLast = now;

  clockEl.textContent = (elapsed / 1000).toFixed(1) + 's';

  const baseUnitPerSec = STATE.raceDistance / (STATE.raceDuration / 1000);

  // 1) 효과 만료 처리
  STATE.horses.forEach(h => {
    h.activeEffects = h.activeEffects.filter(eff => {
      if (eff.until <= elapsed) {
        // 효과 만료
        applyEffectVisual(h, eff.type, false);
        return false;
      }
      return true;
    });
  });

  // 2) 아이템 사용 체크
  STATE.horses.forEach(h => {
    if (h.finished) return;
    if (elapsed >= h.nextItemTime && h.itemsUsed < 4 && t < 0.95) {
      useItem(h, elapsed);
      h.itemsUsed++;
      h.nextItemTime = elapsed + 3500 + Math.random() * 5000;
    }
  });

  // 3) 각 말 위치 갱신
  STATE.horses.forEach(h => {
    if (h.finished) return;
    let pace = paceAt(h.profile, t);

    // 효과 적용
    let speedMultiplier = 1.0;
    let isBoost = false;
    let isSlow = false;
    for (const eff of h.activeEffects) {
      if (eff.type === 'BOOST') { speedMultiplier *= 2.0; isBoost = true; }
      if (eff.type === 'SLOW')  { speedMultiplier *= 0.45; isSlow = true; }
    }

    const speed = baseUnitPerSec * pace * speedMultiplier;
    h.currentSpeed = speed; // 가상 단위/초
    h.distance += speed * dtSec;

    // 시각 효과
    if (isBoost && !h.el.classList.contains('boost')) {
      h.el.classList.add('boost');
    } else if (!isBoost && h.el.classList.contains('boost')) {
      h.el.classList.remove('boost');
    }
    if (isSlow && !h.el.classList.contains('slowed')) {
      h.el.classList.add('slowed');
    } else if (!isSlow && h.el.classList.contains('slowed')) {
      h.el.classList.remove('slowed');
    }

    // 먼지 (속도가 빠를 때)
    if (Math.random() < (isBoost ? 0.25 : 0.06)) spawnDust(h.el);

    // 위치 갱신
    const ratio = Math.min(h.distance / STATE.raceDistance, 1);
    const px = STATE.trackLeftPad + ratio * STATE.trackWidthPx;
    h.el.style.left = px + 'px';

    // 결승 통과
    if (ratio >= 1 && !h.finished) {
      h.finished = true;
      h.finishTime = elapsed;
      STATE.finishOrder += 1;
      h.finishOrder = STATE.finishOrder;
      h.el.classList.remove('running', 'boost', 'slowed');
      const sufx = ['🥇','🥈','🥉'][h.finishOrder-1] || `#${h.finishOrder}`;
      addEvent('finish', elapsed, `${sufx} ${h.name} 결승선 통과!`, h.name);
    }
  });

  renderRank(false);

  const allFinished = STATE.horses.every(h => h.finished);
  if (allFinished) {
    finishRace(elapsed);
    return;
  }

  // 시간 초과 시 남은 말들 강제 부스트
  if (t >= 1) {
    STATE.horses.forEach(h => {
      if (!h.finished) {
        h.distance += baseUnitPerSec * 1.8 * dtSec;
      }
    });
  }

  STATE.animFrame = requestAnimationFrame(tick);
}

/* ============ 아이템 시스템 ============ */
function pickItem() {
  const r = Math.random();
  let cum = 0;
  for (const key of Object.keys(ITEMS)) {
    cum += ITEMS[key].chance;
    if (r < cum) return key;
  }
  return 'BOOST';
}

function useItem(racer, elapsed) {
  const itemKey = pickItem();
  const item = ITEMS[itemKey];

  // 팝업
  showItemPopup(racer.el, item.msg, item.color);

  if (itemKey === 'BOOST') {
    racer.activeEffects.push({ type: 'BOOST', until: elapsed + item.duration });
    addEvent('boost', elapsed, `${racer.name} 부스트!`, racer.name);
  } else if (itemKey === 'SHIELD') {
    racer.activeEffects.push({ type: 'SHIELD', until: elapsed + item.duration });
    applyEffectVisual(racer, 'SHIELD', true);
    addEvent('shield', elapsed, `${racer.name} 방패 발동!`, racer.name);
  } else if (itemKey === 'ATTACK') {
    // 앞 사람 공격
    const sorted = [...STATE.horses].filter(h => !h.finished && h.id !== racer.id)
      .sort((a, b) => b.distance - a.distance);
    // 자기보다 앞에 있는 사람 중 1명 선택
    const targets = sorted.filter(h => h.distance > racer.distance);
    if (targets.length > 0) {
      const target = targets[Math.floor(Math.random() * Math.min(targets.length, 3))]; // 상위권 위주
      // 방패 보유 체크
      const hasShield = target.activeEffects.some(e => e.type === 'SHIELD');
      if (hasShield) {
        addEvent('shield', elapsed, `${target.name}의 방패가 공격을 막아냄!`, target.name);
        showAttackFX(target.el, '🛡');
      } else {
        target.activeEffects.push({ type: 'SLOW', until: elapsed + 1500 });
        target.el.classList.add('hit');
        setTimeout(() => target.el.classList.remove('hit'), 400);
        showAttackFX(target.el, '⚡');
        addEvent('attack', elapsed, `${racer.name} → ${target.name} 번개공격!`, racer.name);
      }
    } else {
      // 앞에 아무도 없으면 그냥 부스트로 전환
      racer.activeEffects.push({ type: 'BOOST', until: elapsed + 1500 });
      addEvent('boost', elapsed, `${racer.name} 공격 대신 부스트!`, racer.name);
    }
  } else if (itemKey === 'SLOW') {
    // 주변(자기 근처) 2~3명 슬로우
    const others = STATE.horses.filter(h => !h.finished && h.id !== racer.id);
    const nearby = others
      .map(h => ({ h, dist: Math.abs(h.distance - racer.distance) }))
      .sort((a, b) => a.dist - b.dist)
      .slice(0, 2 + Math.floor(Math.random() * 2));
    const affected = [];
    nearby.forEach(({ h }) => {
      const hasShield = h.activeEffects.some(e => e.type === 'SHIELD');
      if (!hasShield) {
        h.activeEffects.push({ type: 'SLOW', until: elapsed + 1300 });
        affected.push(h.name);
        showAttackFX(h.el, '🌀');
      }
    });
    if (affected.length > 0) {
      addEvent('slow', elapsed, `${racer.name} → ${affected.join(', ')} 슬로우!`, racer.name);
    } else {
      addEvent('slow', elapsed, `${racer.name} 슬로우 트랩 (모두 방어함)`, racer.name);
    }
  }
}

function applyEffectVisual(racer, type, on) {
  if (type === 'SHIELD') {
    if (on) {
      racer.el.classList.add('shielded');
      if (!racer.el.querySelector('.shield-bubble')) {
        const bubble = document.createElement('div');
        bubble.className = 'shield-bubble';
        racer.el.appendChild(bubble);
      }
    } else {
      racer.el.classList.remove('shielded');
      const bubble = racer.el.querySelector('.shield-bubble');
      if (bubble) bubble.remove();
    }
  }
}

function showItemPopup(el, msg, colorClass) {
  const popup = document.createElement('div');
  popup.className = `item-popup ${colorClass}`;
  popup.textContent = msg;
  el.appendChild(popup);
  setTimeout(() => popup.remove(), 1300);
}

function showAttackFX(el, icon) {
  const fx = document.createElement('div');
  fx.className = 'attack-fx';
  fx.textContent = icon;
  // 트랙 좌표계로 변환
  const lane = el.parentElement;
  const left = parseFloat(el.style.left);
  fx.style.left = left + 'px';
  fx.style.top = '50%';
  lane.appendChild(fx);
  setTimeout(() => fx.remove(), 600);
}

function spawnDust(racerEl) {
  const dust = document.createElement('div');
  dust.className = 'dust';
  const lane = racerEl.parentElement;
  const left = parseFloat(racerEl.style.left);
  dust.style.left = (left - 20) + 'px';
  dust.style.top = 'calc(50% + 10px)';
  lane.appendChild(dust);
  setTimeout(() => dust.remove(), 700);
}

/* ============ 이벤트 로그 ============ */
function addEvent(type, elapsed, msg, name) {
  const time = (elapsed / 1000).toFixed(1) + 's';
  const li = document.createElement('li');
  li.className = `event-item ${type}`;
  li.innerHTML = `<span class="ev-time">${time}</span>${msg}`;
  eventLogEl.insertBefore(li, eventLogEl.firstChild);
  // 최대 30개 유지
  while (eventLogEl.children.length > 30) {
    eventLogEl.removeChild(eventLogEl.lastChild);
  }
}

/* ============ 순위 ============ */
function renderRank(forceInitial) {
  const sorted = [...STATE.horses].sort((a, b) => {
    if (a.finished && b.finished) return a.finishOrder - b.finishOrder;
    if (a.finished) return -1;
    if (b.finished) return 1;
    return b.distance - a.distance;
  });

  const existing = {};
  rankList.querySelectorAll('.rank-item').forEach(el => {
    existing[el.dataset.id] = el;
  });

  sorted.forEach((h, idx) => {
    let item = existing[h.id];
    if (!item) {
      item = document.createElement('li');
      item.className = 'rank-item';
      item.dataset.id = h.id;
      item.innerHTML = `
        <span class="rank-num"></span>
        <span class="rank-name"></span>
        <span class="rank-progress"></span>
      `;
      rankList.appendChild(item);
    }
    item.querySelector('.rank-num').textContent = (idx + 1);
    item.querySelector('.rank-name').innerHTML = `<span class="animal-tag">${h.animal.name}</span>${h.name}`;
    if (h.finished) {
      item.querySelector('.rank-progress').textContent = (h.finishTime / 1000).toFixed(2) + 's';
      item.classList.add('finished');
    } else {
      const meters = Math.round((h.distance / STATE.raceDistance) * 1000);
      // km/h 환산 (가상): 현재 속도 * 보정값
      const kmh = Math.round(h.currentSpeed * 1.8);
      item.querySelector('.rank-progress').innerHTML = `${meters}m<br><span class="speed">${kmh} km/h</span>`;
      item.classList.remove('finished');
    }
    item.classList.toggle('rank-1', idx === 0);
    item.classList.toggle('rank-2', idx === 1);
    item.classList.toggle('rank-3', idx === 2);

    if (rankList.children[idx] !== item) {
      rankList.insertBefore(item, rankList.children[idx]);
    }
  });

  const fin = STATE.horses.filter(h => h.finished).length;
  finishedCount.textContent = `${fin}/${STATE.horses.length}`;
}

/* ============ 종료 ============ */
function finishRace(elapsed) {
  STATE.isRunning = false;
  cancelAnimationFrame(STATE.animFrame);
  STATE.animFrameLast = null;
  STATE.horses.forEach(h => h.el.classList.remove('running', 'boost', 'slowed'));

  statusPill.className = 'status-pill done';
  statusPill.textContent = '● FINISHED';
  phaseInfo.textContent = 'FINISHED';
  footerHint.textContent = '🏆 레이스 종료!';
  clockEl.textContent = (elapsed / 1000).toFixed(1) + 's';

  startBtn.disabled = false;
  resetBtn.disabled = false;
  incBtn.disabled = false;
  decBtn.disabled = false;
  countInput.disabled = false;
  namesInput.disabled = false;

  showResults();
}

function showResults() {
  const sorted = [...STATE.horses].sort((a, b) => a.finishOrder - b.finishOrder);
  podiumEl.innerHTML = '';
  const order = [1, 0, 2];
  order.forEach((idx) => {
    const h = sorted[idx];
    if (!h) return;
    const cls = idx === 0 ? 'p1' : idx === 1 ? 'p2' : 'p3';
    const div = document.createElement('div');
    div.className = `podium-spot ${cls}`;
    div.innerHTML = `
      <div class="podium-rank">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉'}</div>
      <div class="podium-name">${escapeHtml(h.name)}</div>
      <div style="font-size:9px;margin-top:3px;opacity:0.7;">${h.animal.name}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;margin-top:4px;opacity:0.8;">
        ${(h.finishTime/1000).toFixed(2)}s
      </div>
    `;
    podiumEl.appendChild(div);
  });

  fullResultsEl.innerHTML = '';
  sorted.forEach((h, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <span><span class="pos">${String(i+1).padStart(2,'0')}.</span>${escapeHtml(h.name)} <span style="color:var(--ink-dim);font-size:10px;">(${h.animal.name})</span></span>
      <span style="font-family:'JetBrains Mono',monospace;color:var(--ink-dim);">${(h.finishTime/1000).toFixed(2)}s</span>
    `;
    fullResultsEl.appendChild(li);
  });

  STATE.raceCount += 1;
  raceNoEl.textContent = String(STATE.raceCount).padStart(3, '0');

  setTimeout(() => resultModal.classList.add('show'), 600);
}

function resetRace() {
  if (STATE.isRunning) {
    cancelAnimationFrame(STATE.animFrame);
    STATE.isRunning = false;
  }
  STATE.animFrameLast = null;
  clockEl.textContent = '00.0s';
  statusPill.className = 'status-pill idle';
  statusPill.textContent = '● STANDBY';
  phaseInfo.textContent = 'WAITING';
  footerHint.textContent = '참가 인원을 설정하고 START RACE를 눌러주세요';
  startBtn.disabled = false;
  resetBtn.disabled = false;
  incBtn.disabled = false;
  decBtn.disabled = false;
  countInput.disabled = false;
  namesInput.disabled = false;
  eventLogEl.innerHTML = '';
  setupRacers();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

init();
</script>
